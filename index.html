<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Zafer Partisi - Üye Sistemi</title>
    
    <!-- Leaflet CSS (Harita için) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f7;
            --bg-glass: rgba(255, 255, 255, 0.8);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #003366;
            --accent-light: #004080;
            --border: rgba(0, 0, 0, 0.1);
            --shadow: rgba(0, 0, 0, 0.1);
            --danger: #ff3b30;
            --success: #34c759;
            --warning: #ff9500;
        }

        [data-theme="dark"] {
            --bg-primary: #000000;
            --bg-secondary: #1c1c1e;
            --bg-glass: rgba(28, 28, 30, 0.8);
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --accent: #0a84ff;
            --accent-light: #409cff;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: rgba(0, 0, 0, 0.5);
        }

        [data-theme="burokrat"] {
            --bg-primary: #fefefe;
            --bg-secondary: #f0f0f0;
            --bg-glass: rgba(240, 240, 240, 0.95);
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --accent: #34495e;
            --accent-light: #2c3e50;
            --border: rgba(0, 0, 0, 0.15);
            --shadow: rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            transition: background 0.3s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s ease;
            height: 100vh;
            width: 100vw;
        }

        /* iOS Notification Banner */
        .ios-notification {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: white;
            padding: 14px 24px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 500;
            z-index: 10000;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .ios-notification.show {
            top: 60px;
            opacity: 1;
        }

        .ios-notification.push {
            background: rgba(0, 51, 102, 0.9);
        }

        /* Screens */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            background: var(--bg-primary);
            animation: fadeIn 0.4s ease;
            overflow: hidden;
        }

        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Splash Screen */
        #splash-screen {
            background: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #splash-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Login Screen */
        .login-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 30px;
            gap: 24px;
        }

        .logo-box {
            width: 130px;
            height: 130px;
            background: var(--accent);
            border-radius: 30px;
            box-shadow: 0 25px 70px rgba(0, 51, 102, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .logo-box::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .input-group {
            width: 100%;
            max-width: 340px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .input-group input {
            width: 100%;
            padding: 18px 20px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 17px;
            font-family: inherit;
            transition: all 0.2s;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--accent);
            background: var(--bg-primary);
            box-shadow: 0 0 0 4px rgba(0, 51, 102, 0.1);
            transform: scale(1.02);
        }

        .btn-primary {
            width: 100%;
            max-width: 340px;
            padding: 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 51, 102, 0.3);
        }

        .btn-primary:active { transform: scale(0.96); }

        .btn-bio {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 2px solid var(--border);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-bio.active {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        /* Main Screen */
        #main-screen {
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .settings-btn {
            position: absolute;
            top: 60px;
            right: 25px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            transition: all 0.3s;
            z-index: 100;
            box-shadow: 0 4px 20px var(--shadow);
        }

        .settings-btn:active { transform: rotate(90deg) scale(0.9); }

        .main-logo {
            width: 180px;
            height: 180px;
            background: var(--accent);
            border-radius: 40px;
            margin-bottom: 50px;
            box-shadow: 0 40px 100px rgba(0, 51, 102, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 80px;
            animation: float 6s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-25px); }
        }

        .pulse-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: white;
            font-size: 36px;
            cursor: pointer;
            position: relative;
            box-shadow: 0 15px 50px rgba(0, 51, 102, 0.4);
            transition: all 0.3s;
            z-index: 2;
        }

        .pulse-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse-ring 2s infinite;
            z-index: -1;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        .pulse-btn.map-btn {
            position: absolute;
            bottom: 100px;
            width: 70px;
            height: 70px;
            font-size: 28px;
        }

        /* Theme Selector */
        .theme-selector {
            position: absolute;
            top: 120px;
            right: 25px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 20px 60px var(--shadow);
            display: none;
            flex-direction: column;
            gap: 10px;
            border: 1px solid var(--border);
            z-index: 99;
            min-width: 180px;
        }

        .theme-selector.show { display: flex; animation: slideDown 0.3s ease; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .theme-option {
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-option:hover { background: rgba(0,0,0,0.05); }
        .theme-option.active { background: var(--accent); color: white; }

        .theme-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.2);
        }

        .dot-default { background: linear-gradient(135deg, #fff 50%, #003366 50%); }
        .dot-dark { background: #000; }
        .dot-burokrat { background: #ecf0f1; }

        /* List Screen */
        .list-header {
            padding: 70px 25px 20px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            gap: 12px;
        }

        .search-bar {
            flex: 1;
            padding: 14px 20px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }

        .search-bar:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0, 51, 102, 0.1);
        }

        .admin-btn {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: var(--accent);
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 51, 102, 0.3);
            transition: transform 0.2s;
        }

        .admin-btn.visible { display: flex; }
        .admin-btn:active { transform: scale(0.9); }

        .back-btn {
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 20px;
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .member-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            gap: 18px;
            border: 1.5px solid var(--border);
            transition: all 0.3s;
            animation: slideIn 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .member-card:active { transform: scale(0.98); }

        .member-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .member-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .member-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .member-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .member-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .social-links {
            display: flex;
            gap: 10px;
        }

        .social-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .social-icon:active { transform: scale(0.85); background: var(--accent); }

        .edit-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(0,0,0,0.05);
            cursor: pointer;
            font-size: 18px;
            opacity: 0.6;
            transition: all 0.2s;
        }

        .edit-btn:hover { opacity: 1; background: var(--accent); color: white; }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            padding: 25px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
        }

        .page-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .page-btn:not(:disabled):active { background: var(--accent); color: white; transform: scale(0.9); }

        .page-info {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-secondary);
            min-width: 80px;
            text-align: center;
        }

        /* Map Screen */
        #map-screen .list-header {
            padding-top: 60px;
            justify-content: space-between;
            align-items: center;
        }

        #map {
            flex: 1;
            width: 100%;
            background: #f0f0f0;
            z-index: 1;
        }

        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            background: var(--bg-primary);
            color: var(--text-primary);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .leaflet-popup-content {
            margin: 12px;
            font-family: inherit;
        }

        .leaflet-popup-content b {
            font-size: 16px;
            display: block;
            margin-bottom: 5px;
            color: var(--accent);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: flex-end;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-overlay.show { display: flex; opacity: 1; }

        .modal-content {
            background: var(--bg-primary);
            width: 100%;
            max-width: 600px;
            border-radius: 30px 30px 0 0;
            padding: 30px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 -10px 60px rgba(0,0,0,0.3);
        }

        .modal-overlay.show .modal-content { transform: translateY(0); }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
        }

        .close-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .close-btn:active { transform: rotate(90deg); }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 16px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0, 51, 102, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .location-btn {
            width: 100%;
            padding: 14px;
            border: 2px dashed var(--border);
            border-radius: 14px;
            background: transparent;
            color: var(--accent);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .location-btn:active { background: rgba(0,51,102,0.05); transform: scale(0.98); }

        .coords-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .btn-secondary {
            flex: 1;
            padding: 18px;
            border-radius: 14px;
            border: 1.5px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:active { transform: scale(0.96); }

        .btn-danger {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        /* Offline Indicator */
        .offline-indicator {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--danger);
            color: white;
            padding: 14px 28px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 700;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9998;
            box-shadow: 0 10px 40px rgba(255, 59, 48, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .offline-indicator.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* DevTools Protection */
        .devtools-detected {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            padding: 40px;
            line-height: 1.5;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            color: white;
        }

        .loading-overlay.show { display: flex; }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Notification Badge */
        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 10px;
            display: none;
        }

        .badge.show { display: block; animation: bounce 0.5s; }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <!-- DevTools Protection -->
    <div class="devtools-detected" id="devtools-block">
        🔒 Güvenlik İhlali Tespit Edildi<br>
        <span style="font-size:18px; font-weight:400; margin-top:10px; display:block;">
            Lütfen geliştirici araçlarını kapatıp yeniden deneyin.
        </span>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <div style="font-weight:600;">İşlem yapılıyor...</div>
    </div>

    <!-- iOS Notification -->
    <div class="ios-notification" id="notification">
        <span id="notif-icon">📡</span>
        <span id="notif-text">Yeni güncellemeler için internetinizi açık tutun</span>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // ==================== KONFİGÜRASYON ====================
        
        // ⚠️ ÖNEMLİ: Bu hash'leri kendi şifrelerinizle değiştirin!
        // SHA256("ceyhun123") gibi bir değer kullanın
        const CONFIG = {
            ADMIN_HASH: '8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92',
            ACCESS_CODES_HASH: [
                '8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92', // Örnek
            ],
            ENCRYPTION_KEY: 'zafer-partisi-secure-key-2024',
            ITEMS_PER_PAGE: 10
        };

        // ==================== STATE ====================
        
        const state = {
            currentUser: null,
            isAdmin: false,
            biometricEnabled: false,
            members: [],
            currentPage: 1,
            editingId: null,
            db: null,
            map: null,
            mapMarkers: [],
            swRegistration: null,
            isOnline: navigator.onLine
        };

        // ==================== KRYPTOGRAFİ ====================

        const Crypto = {
            async sha256(message) {
                const encoder = new TextEncoder();
                const data = encoder.encode(message);
                const hash = await window.crypto.subtle.digest('SHA-256', data);
                return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
            },

            async encrypt(text, password) {
                const encoder = new TextEncoder();
                const data = encoder.encode(text);
                const key = await this.getKey(password);
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const encrypted = await window.crypto.subtle.encrypt(
                    { name: 'AES-GCM', iv: iv },
                    key,
                    data
                );
                const combined = new Uint8Array(iv.length + encrypted.byteLength);
                combined.set(iv);
                combined.set(new Uint8Array(encrypted), iv.length);
                return btoa(String.fromCharCode(...combined));
            },

            async decrypt(encryptedData, password) {
                try {
                    const data = Uint8Array.from(atob(encryptedData), c => c.charCodeAt(0));
                    const iv = data.slice(0, 12);
                    const encrypted = data.slice(12);
                    const key = await this.getKey(password);
                    const decrypted = await window.crypto.subtle.decrypt(
                        { name: 'AES-GCM', iv: iv },
                        key,
                        encrypted
                    );
                    return new TextDecoder().decode(decrypted);
                } catch (e) {
                    return null;
                }
            },

            async getKey(password) {
                const encoder = new TextEncoder();
                const keyMaterial = await window.crypto.subtle.importKey(
                    'raw',
                    encoder.encode(password),
                    { name: 'PBKDF2' },
                    false,
                    ['deriveKey']
                );
                return window.crypto.subtle.deriveKey(
                    { name: 'PBKDF2', salt: encoder.encode('zaferpartisi'), iterations: 100000, hash: 'SHA-256' },
                    keyMaterial,
                    { name: 'AES-GCM', length: 256 },
                    false,
                    ['encrypt', 'decrypt']
                );
            }
        };

        // ==================== BİYOMETRİK KİMLİK DOĞRULAMA (WebAuthn) ====================

        const BiometricAuth = {
            async isSupported() {
                return window.PublicKeyCredential !== undefined;
            },

            async register() {
                try {
                    const challenge = new Uint8Array(32);
                    window.crypto.getRandomValues(challenge);
                    
                    const publicKeyCredentialCreationOptions = {
                        challenge: challenge,
                        rp: {
                            name: "Zafer Partisi",
                            id: window.location.hostname
                        },
                        user: {
                            id: new Uint8Array(16),
                            name: state.currentUser.fullName,
                            displayName: state.currentUser.fullName
                        },
                        pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                        authenticatorSelection: {
                            authenticatorAttachment: "platform",
                            userVerification: "required"
                        },
                        timeout: 60000,
                        attestation: "direct"
                    };

                    const credential = await navigator.credentials.create({
                        publicKey: publicKeyCredentialCreationOptions
                    });

                    // Kimlik bilgisini şifreli sakla
                    const credentialId = btoa(String.fromCharCode(...new Uint8Array(credential.rawId)));
                    await saveToDB('biometric', { 
                        id: 'credential', 
                        data: credentialId,
                        user: state.currentUser.fullName 
                    });
                    
                    return true;
                } catch (err) {
                    console.error('Biyometrik kayıt hatası:', err);
                    return false;
                }
            },

            async authenticate() {
                try {
                    const stored = await getFromDB('biometric', 'credential');
                    if (!stored) return false;

                    const challenge = new Uint8Array(32);
                    window.crypto.getRandomValues(challenge);

                    const publicKeyCredentialRequestOptions = {
                        challenge: challenge,
                        allowCredentials: [{
                            id: Uint8Array.from(atob(stored.data), c => c.charCodeAt(0)),
                            type: 'public-key',
                            transports: ['internal']
                        }],
                        userVerification: 'required',
                        timeout: 60000
                    };

                    const assertion = await navigator.credentials.get({
                        publicKey: publicKeyCredentialRequestOptions
                    });

                    return !!assertion;
                } catch (err) {
                    console.error('Biyometrik doğrulama hatası:', err);
                    return false;
                }
            }
        };

        async function toggleBiometric() {
            const btn = document.getElementById('bioBtn');
            if (state.biometricEnabled) {
                state.biometricEnabled = false;
                btn.classList.remove('active');
                btn.innerHTML = '<span>👆</span><span>Biyometrik Doğrulama ile Giriş</span>';
            } else {
                if (await BiometricAuth.isSupported()) {
                    state.biometricEnabled = true;
                    btn.classList.add('active');
                    btn.innerHTML = '<span>✓</span><span>Biyometrik Aktif</span>';
                    showNotification('👆', 'Biyometrik doğrulama etkinleştirildi');
                } else {
                    alert('Cihazınız biyometrik doğrulamayı desteklemiyor');
                }
            }
        }

        // ==================== VERİTABANI (IndexedDB) ====================

        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('ZaferPartisiDB', 2);
                
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    state.db = request.result;
                    resolve();
                };
                
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('members')) {
                        db.createObjectStore('members', { keyPath: 'id', autoIncrement: true });
                    }
                    if (!db.objectStoreNames.contains('settings')) {
                        db.createObjectStore('settings', { keyPath: 'key' });
                    }
                    if (!db.objectStoreNames.contains('biometric')) {
                        db.createObjectStore('biometric', { keyPath: 'id' });
                    }
                    if (!db.objectStoreNames.contains('mapTiles')) {
                        db.createObjectStore('mapTiles', { keyPath: 'url' });
                    }
                };
            });
        }

        async function saveToDB(storeName, data) {
            return new Promise((resolve, reject) => {
                const transaction = state.db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.put(data);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function getFromDB(storeName, key) {
            return new Promise((resolve, reject) => {
                const transaction = state.db.transaction([storeName], 'readonly');
                const store = transaction.objectStore(storeName);
                const request = key ? store.get(key) : store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function deleteFromDB(storeName, key) {
            return new Promise((resolve, reject) => {
                const transaction = state.db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.delete(key);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        // ==================== SERVICE WORKER & PUSH NOTIFICATION ====================

        const SW_CODE = `
            const CACHE_NAME = 'zafer-v2';
            const STATIC_ASSETS = [
                '/',
                '/index.html'
            ];

            // Harita tile'ları için özel cache
            const TILE_CACHE_NAME = 'map-tiles-v1';

            self.addEventListener('install', event => {
                event.waitUntil(
                    caches.open(CACHE_NAME)
                        .then(cache => cache.addAll(STATIC_ASSETS))
                );
                self.skipWaiting();
            });

            self.addEventListener('activate', event => {
                event.waitUntil(
                    caches.keys().then(cacheNames => {
                        return Promise.all(
                            cacheNames
                                .filter(name => name !== CACHE_NAME && name !== TILE_CACHE_NAME)
                                .map(name => caches.delete(name))
                        );
                    })
                );
                self.clients.claim();
            });

            self.addEventListener('fetch', event => {
                const { request } = event;
                const url = new URL(request.url);

                // Harita tile'ları için cache stratejisi
                if (url.hostname.includes('tile.openstreetmap.org')) {
                    event.respondWith(
                        caches.open(TILE_CACHE_NAME).then(cache => {
                            return cache.match(request).then(response => {
                                if (response) return response;
                                return fetch(request).then(fetchResponse => {
                                    cache.put(request, fetchResponse.clone());
                                    return fetchResponse;
                                }).catch(() => new Response('', { status: 503 }));
                            });
                        })
                    );
                    return;
                }

                // Genel cache stratejisi
                event.respondWith(
                    caches.match(request).then(response => {
                        if (response) return response;
                        return fetch(request).catch(() => {
                            if (request.destination === 'video') {
                                return new Response('Video offline', { status: 503 });
                            }
                        });
                    })
                );
            });

            // Push Notification handling
            self.addEventListener('push', event => {
                const data = event.data.json();
                const options = {
                    body: data.body,
                    icon: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==',
                    badge: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==',
                    vibrate: [200, 100, 200],
                    data: data.data || {},
                    actions: [
                        { action: 'open', title: 'Aç' },
                        { action: 'close', title: 'Kapat' }
                    ],
                    requireInteraction: true
                };
                
                event.waitUntil(
                    self.registration.showNotification('Zafer Partisi', options)
                );
            });

            self.addEventListener('notificationclick', event => {
                event.notification.close();
                if (event.action === 'open' || !event.action) {
                    event.waitUntil(
                        clients.openWindow(event.notification.data.url || '/')
                    );
                }
            });

            // Background Sync
            self.addEventListener('sync', event => {
                if (event.tag === 'sync-members') {
                    event.waitUntil(syncMembers());
                }
            });

            async function syncMembers() {
                const clients = await self.clients.matchAll();
                clients.forEach(client => {
                    client.postMessage({ type: 'SYNC_COMPLETE' });
                });
            }
        `;

        async function initServiceWorker() {
            if (!('serviceWorker' in navigator)) return;

            try {
                const blob = new Blob([SW_CODE], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                
                const registration = await navigator.serviceWorker.register(swUrl);
                state.swRegistration = registration;

                // Push notification izni iste
                if ('PushManager' in window) {
                    const permission = await Notification.requestPermission();
                    if (permission === 'granted') {
                        console.log('Push notification izni verildi');
                    }
                }

            } catch (err) {
                console.error('SW kayıt hatası:', err);
            }
        }

        async function sendNotification(title, body, data = {}) {
            // Local notification (Service Worker üzerinden)
            if (state.swRegistration && Notification.permission === 'granted') {
                state.swRegistration.showNotification(title, {
                    body: body,
                    icon: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==',
                    badge: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==',
                    vibrate: [200, 100, 200],
                    data: data
                });
            }

            // Visual notification (in-app)
            showNotification('🔔', body);
        }

        function showNotification(icon, text) {
            const notif = document.getElementById('notification');
            document.getElementById('notif-icon').textContent = icon;
            document.getElementById('notif-text').textContent = text;
            notif.classList.add('show');
            notif.classList.add('push');
            
            setTimeout(() => {
                notif.classList.remove('show');
                setTimeout(() => notif.classList.remove('push'), 500);
            }, 4000);
        }

        // ==================== AĞ DURUMU ====================

        function initNetworkStatus() {
            window.addEventListener('online', async () => {
                state.isOnline = true;
                document.getElementById('offline-indicator').classList.remove('show');
                showNotification('🌐', 'İnternet bağlantısı sağlandı. Senkronizasyon yapılıyor...');
                
                // Background sync tetikle
                if (state.swRegistration && 'sync' in state.swRegistration) {
                    await state.swRegistration.sync.register('sync-members');
                }
                
                await checkForUpdates();
            });

            window.addEventListener('offline', () => {
                state.isOnline = false;
                document.getElementById('offline-indicator').classList.add('show');
                showNotification('📡', 'Yeni güncellemeler için internetinizi açık tutun');
            });

            if (!navigator.onLine) {
                document.getElementById('offline-indicator').classList.add('show');
                showNotification('📡', 'Çevrimdışı mod aktif');
            }
        }

        async function checkForUpdates() {
            // Simüle edilmiş güncelleme kontrolü
            if (Math.random() > 0.5) {
                document.getElementById('update-badge').classList.add('show');
                sendNotification('Yeni Güncelleme', 'Parti üye listesi güncellendi!', {
                    url: window.location.href
                });
            }
        }

        // ==================== GİRİŞ SİSTEMİ ====================

        async function handleLogin() {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const code = document.getElementById('accessCode').value.trim();

            if (!firstName || !lastName || !code) {
                alert('Lütfen tüm alanları doldurun');
                return;
            }

            document.getElementById('loading').classList.add('show');

            try {
                const codeHash = await Crypto.sha256(code);
                const isValidCode = CONFIG.ACCESS_CODES_HASH.includes(codeHash);

                if (!isValidCode) {
                    alert('Geçersiz erişim kodu');
                    document.getElementById('loading').classList.remove('show');
                    return;
                }

                // Admin kontrolü
                const fullName = \`\${firstName} \${lastName}\`;
                const isAdmin = fullName === 'Ceyhun Karaarslan' && codeHash === CONFIG.ADMIN_HASH;

                // Biyometrik doğrulama (Admin için zorunlu, diğerleri için opsiyonel)
                if (state.biometricEnabled || isAdmin) {
                    const bioAuth = await BiometricAuth.authenticate();
                    if (!bioAuth && isAdmin) {
                        alert('Admin girişi için biyometrik doğrulama zorunludur');
                        document.getElementById('loading').classList.remove('show');
                        return;
                    }
                }

                state.currentUser = { firstName, lastName, fullName };
                state.isAdmin = isAdmin;

                // Session kaydet (şifreli)
                const sessionData = await Crypto.encrypt(JSON.stringify({
                    user: state.currentUser,
                    isAdmin: isAdmin,
                    timestamp: Date.now()
                }), code);
                localStorage.setItem('session', sessionData);

                // Admin için biyometrik kayıt (ilk kez giriş yapıyorsa)
                if (isAdmin && await BiometricAuth.isSupported()) {
                    const hasBio = await getFromDB('biometric', 'credential');
                    if (!hasBio) {
                        await BiometricAuth.register();
                    }
                }

                document.getElementById('loading').classList.remove('show');
                showScreen('main-screen');
                
                if (isAdmin) {
                    document.getElementById('adminAddBtn').classList.add('visible');
                    sendNotification('🔐', 'Admin girişi başarılı');
                }

            } catch (err) {
                console.error('Giriş hatası:', err);
                alert('Giriş yapılırken bir hata oluştu');
                document.getElementById('loading').classList.remove('show');
            }
        }

        async function checkExistingSession() {
            const session = localStorage.getItem('session');
            if (!session) return false;

            try {
                // Şifre çözme (basit implementasyon - gerçekte kullanıcıdan şifre istenmeli)
                // Şimdilik session'ı açık tutuyoruz ama veriler şifreli
                return false; // Güvenlik için her seferinde login gerekli
            } catch (e) {
                return false;
            }
        }

        // ==================== EKRAN YÖNETİMİ ====================

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            if (screenId === 'list-screen') {
                loadMembers();
            } else if (screenId === 'map-screen') {
                setTimeout(initMap, 100);
            }
        }

        function toggleSettings() {
            document.getElementById('themeSelector').classList.toggle('show');
        }

        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme === 'default' ? '' : theme);
            localStorage.setItem('theme', theme);
            
            document.querySelectorAll('.theme-option').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            setTimeout(() => {
                document.getElementById('themeSelector').classList.remove('show');
            }, 200);
        }

        function openList() {
            showScreen('list-screen');
        }

        function openMap() {
            showScreen('map-screen');
        }

        // ==================== ÜYE YÖNETİMİ ====================

        async function loadMembers() {
            const members = await getFromDB('members') || [];
            state.members = members;
            renderMembers();
        }

        function renderMembers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = state.members.filter(m => 
                m.name.toLowerCase().includes(searchTerm) || 
                m.description.toLowerCase().includes(searchTerm)
            );
            
            const start = (state.currentPage - 1) * CONFIG.ITEMS_PER_PAGE;
            const end = start + CONFIG.ITEMS_PER_PAGE;
            const pageItems = filtered.slice(start, end);
            
            const container = document.getElementById('memberList');
            container.innerHTML = '';
            
            pageItems.forEach(member => {
                const card = createMemberCard(member);
                container.appendChild(card);
            });
            
            updatePagination(filtered.length);
        }

        function createMemberCard(member) {
            const div = document.createElement('div');
            div.className = 'member-card';
            
            const defaultAvatar = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%23ddd" width="100" height="100"/><text x="50%" y="50%" font-size="40" text-anchor="middle" dy=".3em">👤</text></svg>';
            
            div.innerHTML = \`
                <div class="member-avatar">
                    <img src="\${member.photo || defaultAvatar}" onerror="this.src='\${defaultAvatar}'">
                </div>
                <div class="member-info">
                    <div class="member-name">\${escapeHtml(member.name)}</div>
                    <div class="member-desc">\${escapeHtml(member.description)}</div>
                    <div class="social-links">
                        \${member.socialX ? \`<div class="social-icon" onclick="openLink('\${member.socialX}')">𝕏</div>\` : ''}
                        \${member.socialIG ? \`<div class="social-icon" onclick="openLink('\${member.socialIG}')">📷</div>\` : ''}
                        \${member.socialLinkedIn ? \`<div class="social-icon" onclick="openLink('\${member.socialLinkedIn}')">💼</div>\` : ''}
                        \${member.socialWeb ? \`<div class="social-icon" onclick="openLink('\${member.socialWeb}')">🌐</div>\` : ''}
                    </div>
                </div>
                \${state.isAdmin ? \`<button class="edit-btn" onclick="editMember(\${member.id})">✏️</button>\` : ''}
            \`;
            return div;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function openLink(url) {
            window.open(url, '_blank');
        }

        function updatePagination(total) {
            const totalPages = Math.ceil(total / CONFIG.ITEMS_PER_PAGE) || 1;
            document.getElementById('pageInfo').textContent = \`\${state.currentPage} / \${totalPages}\`;
            document.getElementById('prevBtn').disabled = state.currentPage === 1;
            document.getElementById('nextBtn').disabled = state.currentPage >= totalPages;
        }

        function changePage(delta) {
            state.currentPage += delta;
            renderMembers();
        }

        function filterMembers() {
            state.currentPage = 1;
            renderMembers();
        }

        // ==================== HARİTA İŞLEMLERİ ====================

        function initMap() {
            if (state.map) {
                state.map.invalidateSize();
                plotMembersOnMap();
                return;
            }

            state.map = L.map('map').setView([39.9334, 32.8597], 6);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap',
                maxZoom: 19,
                crossOrigin: true
            }).addTo(state.map);

            plotMembersOnMap();
        }

        function plotMembersOnMap() {
            state.mapMarkers.forEach(marker => state.map.removeLayer(marker));
            state.mapMarkers = [];

            state.members.forEach(member => {
                if (member.lat && member.lng) {
                    const marker = L.marker([member.lat, member.lng])
                        .addTo(state.map)
                        .bindPopup(\`
                            <b>\${member.name}</b><br>
                            \${member.description}<br>
                            <button onclick="window.openLink('\${member.socialWeb || '#'}')" style="margin-top:5px;padding:5px 10px;border:none;background:#003366;color:white;border-radius:5px;cursor:pointer;">Profil</button>
                        \`);
                    state.mapMarkers.push(marker);
                }
            });
        }

        function refreshMap() {
            if (state.map) {
                state.map.invalidateSize();
                plotMembersOnMap();
            }
        }

        async function getCurrentLocation() {
            try {
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 5000,
                        maximumAge: 0
                    });
                });
                
                document.getElementById('memberLat').value = pos.coords.latitude.toFixed(6);
                document.getElementById('memberLng').value = pos.coords.longitude.toFixed(6);
                
                showNotification('📍', 'Konum alındı');
            } catch (err) {
                alert('Konum alınamadı: ' + err.message);
            }
        }

        // ==================== ADMIN MODAL ====================

        function openAdminModal() {
            state.editingId = null;
            document.getElementById('modalTitle').textContent = 'Yeni Üye Ekle';
            document.getElementById('deleteBtn').style.display = 'none';
            clearForm();
            document.getElementById('adminModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('adminModal').classList.remove('show');
        }

        function clearForm() {
            document.getElementById('memberPhoto').value = '';
            document.getElementById('memberName').value = '';
            document.getElementById('memberDesc').value = '';
            document.getElementById('memberLat').value = '';
            document.getElementById('memberLng').value = '';
            document.getElementById('socialX').value = '';
            document.getElementById('socialIG').value = '';
            document.getElementById('socialLinkedIn').value = '';
            document.getElementById('socialWeb').value = '';
        }

        async function editMember(id) {
            const member = state.members.find(m => m.id === id);
            if (!member) return;

            state.editingId = id;
            document.getElementById('modalTitle').textContent = 'Üye Düzenle';
            document.getElementById('deleteBtn').style.display = 'block';

            document.getElementById('memberPhoto').value = member.photo || '';
            document.getElementById('memberName').value = member.name;
            document.getElementById('memberDesc').value = member.description;
            document.getElementById('memberLat').value = member.lat || '';
            document.getElementById('memberLng').value = member.lng || '';
            document.getElementById('socialX').value = member.socialX || '';
            document.getElementById('socialIG').value = member.socialIG || '';
            document.getElementById('socialLinkedIn').value = member.socialLinkedIn || '';
            document.getElementById('socialWeb').value = member.socialWeb || '';

            document.getElementById('adminModal').classList.add('show');
        }

        async function saveMember() {
            const photo = document.getElementById('memberPhoto').value.trim();
            const name = document.getElementById('memberName').value.trim();
            const description = document.getElementById('memberDesc').value.trim();

            if (!name) {
                alert('Ad Soyad zorunludur');
                return;
            }

            const memberData = {
                photo: photo || null,
                name: name,
                description: description,
                lat: parseFloat(document.getElementById('memberLat').value) || null,
                lng: parseFloat(document.getElementById('memberLng').value) || null,
                socialX: document.getElementById('socialX').value.trim(),
                socialIG: document.getElementById('socialIG').value.trim(),
                socialLinkedIn: document.getElementById('socialLinkedIn').value.trim(),
                socialWeb: document.getElementById('socialWeb').value.trim(),
                updatedAt: Date.now()
            };

            if (state.editingId) {
                memberData.id = state.editingId;
            }

            await saveToDB('members', memberData);
            
            // Bildirim gönder
            if (!state.editingId) {
                await sendNotification('🎉', \`Yeni üye: \${name}\`, { url: window.location.href });
            }

            await loadMembers();
            closeModal();
        }

        async function deleteMember() {
            if (!state.editingId) return;
            if (!confirm('Bu üyeyi silmek istediğinize emin misiniz?')) return;

            await deleteFromDB('members', state.editingId);
            await loadMembers();
            closeModal();
            showNotification('🗑️', 'Üye silindi');
        }

        // ==================== GÜVENLİK ====================

        (function initSecurity() {
            // DevTools detection
            const threshold = 160;
            setInterval(() => {
                const widthThreshold = window.outerWidth - window.innerWidth > threshold;
                const heightThreshold = window.outerHeight - window.innerHeight > threshold;
                
                if (widthThreshold || heightThreshold) {
                    document.getElementById('devtools-block').style.display = 'flex';
                    document.body.style.overflow = 'hidden';
                } else {
                    document.getElementById('devtools-block').style.display = 'none';
                    document.body.style.overflow = '';
                }
            }, 500);

            // Debugger engelleme
            setInterval(() => {
                const start = new Date();
                debugger;
                const end = new Date();
                if (end - start > 100) {
                    window.location.href = 'about:blank';
                }
            }, 100);

            // Context menu engelleme (opsiyonel)
            // document.addEventListener('contextmenu', e => e.preventDefault());
        })();

        // ==================== BAŞLATMA ====================

        async function initApp() {
            // Tema yükle
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme && savedTheme !== 'default') {
                document.body.setAttribute('data-theme', savedTheme);
            }

            await initDB();
            await initServiceWorker();
            initNetworkStatus();

            // Video splash
            const video = document.getElementById('splash-video');
            video.onended = async () => {
                setTimeout(() => {
                    showScreen('login-screen');
                }, 500);
            };

            video.onerror = () => {
                setTimeout(() => showScreen('login-screen'), 2000);
            };
        }

        // Uygulamayı başlat
        initApp();

        // Back button handling
        window.addEventListener('popstate', (e) => {
            if (document.getElementById('list-screen').classList.contains('active')) {
                showScreen('main-screen');
                e.preventDefault();
            } else if (document.getElementById('map-screen').classList.contains('active')) {
                showScreen('main-screen');
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
