<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Zafer Partisi - Üye Sistemi</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <!-- Stil Dosyası -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Güvenlik Engeli -->
    <div id="security-block">
        🔒 Güvenlik İhlali Tespit Edildi<br>
        <span>Lütfen geliştirici araçlarını kapatın</span>
    </div>

    <!-- Yükleme Ekranı -->
    <div id="loader">
        <div class="spinner"></div>
        <div>Yükleniyor...</div>
    </div>

    <!-- Bildirim -->
    <div id="toast">
        <span id="toast-icon">📡</span>
        <span id="toast-msg">Bildirim</span>
    </div>

    <!-- Çevrimdışı Uyarısı -->
    <div id="offline-bar">
        <span>⚠️</span>
        <span>Çevrimdışı Mod - Güncellemeler için internet bağlantısı gerekli</span>
    </div>

    <!-- Splash Screen (Dikey Video) -->
    <div id="splash-screen">
        <div class="video-container">
            <video id="splash-video" autoplay muted playsinline webkit-playsinline>
                <!-- KENDİ DİKEY VİDIONU BURAYA KOY: src="intro.mp4" -->
                <source src="intro.mp4" type="video/mp4">
                Tarayıcınız video desteklemiyor
            </video>
            <div class="video-skip" onclick="forceSkipVideo()">Atla →</div>
        </div>
    </div>

    <!-- Login Ekranı -->
    <div class="screen" id="login-screen">
        <div class="login-container">
            <div class="brand-logo">🦅</div>
            
            <div class="input-group">
                <label>Ad</label>
                <input type="text" id="input-firstname" placeholder="Adınızı girin" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Soyad</label>
                <input type="text" id="input-lastname" placeholder="Soyadınızı girin" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Özel Kod</label>
                <input type="password" id="input-code" placeholder="••••••" autocomplete="off" maxlength="6">
            </div>

            <button class="btn btn-primary" onclick="handleLogin()">Giriş Yap</button>
            
            <button class="btn btn-bio" id="btn-bio" onclick="toggleBiometric()">
                <span class="bio-icon">👆</span>
                <span class="bio-text">Biyometrik Doğrulama ile Giriş</span>
            </button>
            
            <div class="security-info">
                <span>🔐 SHA-256 & AES-256 Şifreleme Aktif</span>
            </div>
        </div>
    </div>

    <!-- Ana Ekran -->
    <div class="screen" id="main-screen">
        <div class="top-bar">
            <button class="btn-icon" onclick="showNotifications()">
                🔔
                <span class="badge" id="update-badge">1</span>
            </button>
            <button class="btn-icon" onclick="toggleSettings()">⚙️</button>
        </div>
        
        <div class="theme-panel" id="theme-panel">
            <div class="theme-item active" onclick="setTheme('default')">
                <div class="color-dot dot-default"></div>
                <span>Varsayılan</span>
            </div>
            <div class="theme-item" onclick="setTheme('dark')">
                <div class="color-dot dot-dark"></div>
                <span>Koyu Mod</span>
            </div>
            <div class="theme-item" onclick="setTheme('burokrat')">
                <div class="color-dot dot-burokrat"></div>
                <span>Klasik</span>
            </div>
        </div>

        <div class="main-content">
            <div class="hero-logo">🦅</div>
            <div class="hero-text">Zafer Partisi</div>
            
            <button class="btn-pulse" onclick="navigateTo('list')">
                <span class="pulse-ring"></span>
                <span class="btn-icon-inner">→</span>
            </button>
            
            <button class="btn-pulse btn-map" onclick="navigateTo('map')">
                <span class="pulse-ring"></span>
                <span class="btn-icon-inner">🗺️</span>
            </button>
        </div>

        <div class="user-info" id="user-display"></div>
    </div>

    <!-- Liste Ekranı -->
    <div class="screen" id="list-screen">
        <div class="header">
            <button class="btn-icon back" onclick="navigateTo('main')">←</button>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Üye ara..." onkeyup="renderMembers()">
            </div>
            <button class="btn-icon add" id="btn-add" onclick="openModal()">+</button>
        </div>
        
        <div class="content-list" id="members-list"></div>

        <div class="pagination">
            <button class="page-btn" onclick="changePage(-1)">←</button>
            <span class="page-info" id="page-info">1 / 1</span>
            <button class="page-btn" onclick="changePage(1)">→</button>
        </div>
    </div>

    <!-- Harita Ekranı -->
    <div class="screen" id="map-screen">
        <div class="header">
            <button class="btn-icon back" onclick="navigateTo('main')">←</button>
            <span class="header-title">Üye Haritası</span>
            <button class="btn-icon refresh" onclick="refreshMap()">⟳</button>
        </div>
        <div id="map"></div>
    </div>

    <!-- Admin Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-sheet">
            <div class="modal-header">
                <h3 id="modal-title">Yeni Üye Ekle</h3>
                <button class="btn-close" onclick="closeModal()">×</button>
            </div>
            
            <div class="modal-body">
                <div class="form-group">
                    <label>Profil Fotoğrafı (Base64)</label>
                    <input type="text" id="m-photo" placeholder="data:image/jpeg;base64,/9j/4AAQ...">
                </div>
                
                <div class="form-group">
                    <label>Ad Soyad *</label>
                    <input type="text" id="m-name" placeholder="Ahmet Yılmaz">
                </div>
                
                <div class="form-group">
                    <label>Açıklama / Görev</label>
                    <textarea id="m-desc" placeholder="İlçe Başkanı, Parti Üyesi..."></textarea>
                </div>

                <div class="form-group">
                    <label>Konum (Harita için)</label>
                    <button class="btn-location" onclick="getCurrentLocation()">
                        📍 Mevcut Konumu Kullan
                    </button>
                    <div class="coords-inputs">
                        <input type="number" id="m-lat" placeholder="Enlem" step="any">
                        <input type="number" id="m-lng" placeholder="Boylam" step="any">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Sosyal Medya Linkleri</label>
                    <input type="url" id="m-x" placeholder="X (Twitter) URL">
                    <input type="url" id="m-ig" placeholder="Instagram URL">
                    <input type="url" id="m-li" placeholder="LinkedIn URL">
                    <input type="url" id="m-web" placeholder="Kişisel Web Sitesi">
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-danger" id="btn-delete" style="display:none" onclick="deleteMember()">Sil</button>
                <button class="btn btn-secondary" onclick="closeModal()">İptal</button>
                <button class="btn btn-primary" onclick="saveMember()">Kaydet</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    
    <!-- Uygulama JS -->
    <script src="app.js"></script>
</body>
</html>
