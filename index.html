<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Zafer Partisi - Üye Sistemi</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Kendi CSS'in -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- DevTools Protection -->
    <div class="devtools-detected" id="devtools-block">
        🔒 Güvenlik İhlali Tespit Edildi<br>
        <span style="font-size:18px; font-weight:400; margin-top:10px; display:block;">
            Lütfen geliştirici araçlarını kapatıp yeniden deneyin.
        </span>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <div style="font-weight:600;">İşlem yapılıyor...</div>
    </div>

    <!-- iOS Notification -->
    <div class="ios-notification" id="notification">
        <span id="notif-icon">📡</span>
        <span id="notif-text">Yeni güncellemeler için internetinizi açık tutun</span>
    </div>

    <!-- Offline Indicator -->
    <div class="offline-indicator" id="offline-indicator">
        <span>⚠️</span>
        <span>Çevrimdışı Mod</span>
    </div>

    <!-- Splash Screen -->
    <div class="screen active" id="splash-screen">
        <video id="splash-video" autoplay muted playsinline>
            <source src="intro.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Login Screen -->
    <div class="screen" id="login-screen">
        <div class="login-container">
            <div class="logo-box">🦅</div>
            
            <div class="input-group">
                <label>Ad</label>
                <input type="text" id="firstName" placeholder="Adınızı girin" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Soyad</label>
                <input type="text" id="lastName" placeholder="Soyadınızı girin" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Özel Kod</label>
                <input type="password" id="accessCode" placeholder="••••••" autocomplete="off" maxlength="6">
            </div>

            <button class="btn-primary" onclick="handleLogin()">Giriş Yap</button>
            
            <button class="btn-primary btn-bio" id="bioBtn" onclick="toggleBiometric()">
                <span>👆</span>
                <span>Biyometrik Doğrulama ile Giriş</span>
            </button>
        </div>
    </div>

    <!-- Main Screen -->
    <div class="screen" id="main-screen">
        <button class="settings-btn" onclick="toggleSettings()">
            ⚙️
            <span class="badge" id="update-badge">1</span>
        </button>
        
        <div class="theme-selector" id="themeSelector">
            <div class="theme-option active" onclick="setTheme('default')">
                <div class="theme-dot dot-default"></div>
                <span>Varsayılan</span>
            </div>
            <div class="theme-option" onclick="setTheme('dark')">
                <div class="theme-dot dot-dark"></div>
                <span>Koyu Mod</span>
            </div>
            <div class="theme-option" onclick="setTheme('burokrat')">
                <div class="theme-dot dot-burokrat"></div>
                <span>Klasik</span>
            </div>
        </div>

        <div class="main-logo">🦅</div>
        
        <button class="pulse-btn" onclick="openList()">→</button>
        <button class="pulse-btn map-btn" onclick="openMap()">🗺️</button>
    </div>

    <!-- List Screen -->
    <div class="screen" id="list-screen">
        <div class="list-header">
            <button class="admin-btn back-btn" onclick="showScreen('main-screen')">←</button>
            <input type="text" class="search-bar" id="searchInput" placeholder="Üye ara..." onkeyup="filterMembers()">
            <button class="admin-btn" id="adminAddBtn" onclick="openAdminModal()">+</button>
        </div>
        
        <div class="list-container" id="memberList"></div>

        <div class="pagination" id="pagination">
            <button class="page-btn" id="prevBtn" onclick="changePage(-1)">←</button>
            <span class="page-info" id="pageInfo">1 / 1</span>
            <button class="page-btn" id="nextBtn" onclick="changePage(1)">→</button>
        </div>
    </div>

    <!-- Map Screen -->
    <div class="screen" id="map-screen">
        <div class="list-header">
            <button class="admin-btn back-btn" onclick="showScreen('main-screen')">←</button>
            <span style="font-weight:700; font-size:18px;">Üye Haritası</span>
            <button class="admin-btn" onclick="refreshMap()" style="background:var(--success);">⟳</button>
        </div>
        <div id="map"></div>
    </div>

    <!-- Admin Modal -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">Yeni Üye Ekle</span>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            
            <div class="form-group">
                <label>Profil Fotoğrafı (Base64 veya URL)</label>
                <input type="text" id="memberPhoto" placeholder="data:image/jpeg;base64,...">
            </div>
            
            <div class="form-group">
                <label>Ad Soyad</label>
                <input type="text" id="memberName" placeholder="Ahmet Yılmaz">
            </div>
            
            <div class="form-group">
                <label>Açıklama / Görev</label>
                <textarea id="memberDesc" placeholder="İlçe Başkanı, Parti Üyesi..."></textarea>
            </div>

            <div class="form-group">
                <label>Konum (Harita için)</label>
                <button class="location-btn" onclick="getCurrentLocation()">
                    📍 Mevcut Konumu Kullan
                </button>
                <div class="coords-row">
                    <input type="number" id="memberLat" placeholder="Enlem" step="any">
                    <input type="number" id="memberLng" placeholder="Boylam" step="any">
                </div>
            </div>
            
            <div class="form-group">
                <label>Sosyal Medya Linkleri</label>
                <input type="text" id="socialX" placeholder="X (Twitter) URL" style="margin-bottom:10px;">
                <input type="text" id="socialIG" placeholder="Instagram URL" style="margin-bottom:10px;">
                <input type="text" id="socialLinkedIn" placeholder="LinkedIn URL" style="margin-bottom:10px;">
                <input type="text" id="socialWeb" placeholder="Web Sitesi">
            </div>

            <div class="btn-group">
                <button class="btn-secondary btn-danger" id="deleteBtn" style="display:none" onclick="deleteMember()">Sil</button>
                <button class="btn-secondary" onclick="closeModal()">İptal</button>
                <button class="btn-primary" onclick="saveMember()">Kaydet</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Kendi JS'in -->
    <script src="app.js"></script>
</body>
</html>
