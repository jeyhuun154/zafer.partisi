<!DOCTYPE html>
<html lang="tr" data-theme="default">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Zafer Partisi">
  <meta name="theme-color" content="#1B2E6E">
  <title>Zafer Partisi</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
<div id="app-shell" class="app-shell">

  <!-- ── Offline Banner ─────────────────────────── -->
  <div id="offline-banner" class="offline-banner" role="alert" aria-live="polite">
    <div class="offline-banner__inner">
      <svg class="offline-banner__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
      <span class="offline-banner__text">Yeni güncellemeler için internet bağlantınızı açık tutun</span>
      <button class="offline-banner__close" id="close-banner-btn" aria-label="Kapat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ── Screen: Splash ─────────────────────────── -->
  <div id="screen-splash" class="screen screen--active">
    <video id="splash-video" class="splash-video" playsinline muted autoplay preload="auto">
      <source src="assets/intro.mp4" type="video/mp4">
    </video>
    <!-- Fallback if no video yet -->
    <div id="splash-fallback" class="splash-fallback">
      <div class="splash-fallback__logo">
        <img src="assets/logo.png" alt="Zafer Partisi" onerror="this.style.display='none'">
        <div class="splash-fallback__placeholder"></div>
      </div>
      <div class="splash-fallback__progress">
        <div class="splash-fallback__bar"></div>
      </div>
    </div>
  </div>

  <!-- ── Screen: Login ──────────────────────────── -->
  <div id="screen-login" class="screen">
    <div class="login-container">
      <div class="login__top">
        <div class="login__logo-wrap">
          <img src="assets/logo.png" alt="Zafer Partisi" class="login__logo" onerror="this.parentElement.classList.add('login__logo-wrap--fallback')">
          <div class="login__logo-fallback" aria-hidden="true">ZP</div>
        </div>
      </div>
      <div class="login__form-card">
        <h1 class="login__title">Hoş Geldiniz</h1>
        <p class="login__subtitle">Devam etmek için bilgilerinizi girin</p>
        <div class="form-group">
          <label class="form-label" for="login-first-name">Ad</label>
          <input type="text" id="login-first-name" class="form-input" placeholder="Adınız" autocomplete="given-name" autocapitalize="words">
        </div>
        <div class="form-group">
          <label class="form-label" for="login-last-name">Soyad</label>
          <input type="text" id="login-last-name" class="form-input" placeholder="Soyadınız" autocomplete="family-name" autocapitalize="words">
        </div>
        <div class="form-group">
          <label class="form-label" for="login-code">Özel Kod</label>
          <div class="input-wrap">
            <input type="password" id="login-code" class="form-input" placeholder="••••••••" autocomplete="current-password">
            <button class="input-eye-btn" id="toggle-password" type="button" aria-label="Şifreyi göster/gizle">
              <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <p id="login-error" class="form-error" aria-live="polite"></p>
        <button id="login-btn" class="btn btn--primary btn--full">
          <span class="btn__label">Giriş Yap</span>
          <span class="btn__spinner" hidden></span>
        </button>
      </div>
    </div>
  </div>

  <!-- ── Screen: Home ───────────────────────────── -->
  <div id="screen-home" class="screen">
    <header class="app-header">
      <div class="app-header__spacer"></div>
      <button id="settings-btn" class="icon-btn" aria-label="Ayarlar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>
    <div class="home-content">
      <div class="home__logo-wrap" id="home-logo-wrap">
        <img src="assets/logo.png" alt="Zafer Partisi" class="home__logo"
             onerror="document.getElementById('home-logo-wrap').classList.add('home__logo-wrap--fallback')">
        <div class="home__logo-fallback" aria-hidden="true">ZP</div>
      </div>

      <div class="home-tiles">
        <button class="home-tile" id="main-action-btn" aria-label="Üyeleri Gör">
          <div class="home-tile__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </div>
          <span class="home-tile__label">Üyeler</span>
        </button>

        <button class="home-tile" id="map-btn" aria-label="Haritayı Aç">
          <div class="home-tile__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
              <line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>
            </svg>
          </div>
          <span class="home-tile__label">Harita</span>
        </button>

        <button class="home-tile home-tile--wide" id="events-btn" aria-label="Etkinlikler">
          <div class="home-tile__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </div>
          <span class="home-tile__label">Etkinlikler</span>
          <span class="home-tile__badge hidden" id="events-badge">0</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ── Screen: People ─────────────────────────── -->
  <div id="screen-people" class="screen">
    <header class="app-header app-header--titled">
      <button id="back-btn" class="icon-btn" aria-label="Geri">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h2 class="app-header__title">Üyeler</h2>
      <button id="settings-btn-2" class="icon-btn" aria-label="Ayarlar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <div class="search-row">
      <div class="search-bar">
        <svg class="search-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" id="people-search" class="search-bar__input" placeholder="Ara..." autocomplete="off">
        <button id="clear-search-btn" class="search-bar__clear hidden" aria-label="Aramayı temizle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
        </button>
      </div>
      <button id="add-person-btn" class="icon-btn add-btn hidden" aria-label="Kişi Ekle" title="Kişi Ekle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>

    <div id="people-list" class="people-list" role="list">
      <div class="people-list__empty hidden" id="people-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <p>Henüz üye eklenmemiş</p>
      </div>
    </div>

    <nav id="pagination" class="pagination hidden" aria-label="Sayfa navigasyonu">
      <button id="prev-page-btn" class="pagination__btn" aria-label="Önceki sayfa" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <span id="page-indicator" class="pagination__indicator" aria-live="polite">1 / 1</span>
      <button id="next-page-btn" class="pagination__btn" aria-label="Sonraki sayfa" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </nav>
  </div>

  <!-- ── Modal: Settings ────────────────────────── -->
  <div id="modal-settings" class="modal-overlay" aria-hidden="true" role="dialog" aria-label="Ayarlar">
    <div class="modal-sheet" id="modal-settings-sheet">
      <div class="modal-sheet__handle"></div>
      <h3 class="modal-sheet__title">Ayarlar</h3>
      <div class="settings-section">
        <p class="settings-section__label">Tema</p>
        <div class="theme-options">
          <button class="theme-option" data-theme="default">
            <span class="theme-option__swatch theme-option__swatch--default"></span>
            <span class="theme-option__name">Varsayılan</span>
            <span class="theme-option__check">✓</span>
          </button>
          <button class="theme-option" data-theme="dark">
            <span class="theme-option__swatch theme-option__swatch--dark"></span>
            <span class="theme-option__name">Koyu</span>
            <span class="theme-option__check">✓</span>
          </button>
          <button class="theme-option" data-theme="light">
            <span class="theme-option__swatch theme-option__swatch--light"></span>
            <span class="theme-option__name">Açık</span>
            <span class="theme-option__check">✓</span>
          </button>
        </div>
      </div>
      <!-- Admin only: User management -->
      <div id="admin-section" class="settings-section hidden">
        <p class="settings-section__label">Yönetici</p>
        <button id="manage-users-btn" class="settings-row-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
          </svg>
          <span>Kullanıcıları Yönet</span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>
      <div class="settings-divider"></div>
      <button id="logout-btn" class="settings-row-btn settings-row-btn--danger">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Çıkış Yap</span>
      </button>
      <button id="close-settings-btn" class="btn btn--ghost btn--full" style="margin-top:8px">Kapat</button>
    </div>
  </div>

  <!-- ── Modal: Add/Edit Person ─────────────────── -->
  <div id="modal-person" class="modal-overlay" aria-hidden="true" role="dialog" aria-label="Kişi Formu">
    <div class="modal-sheet modal-sheet--tall" id="modal-person-sheet">
      <div class="modal-sheet__handle"></div>
      <h3 class="modal-sheet__title" id="modal-person-title">Kişi Ekle</h3>
      <div class="modal-person-body">
        <div class="photo-upload-row">
          <div class="photo-upload__circle" id="photo-preview-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <img id="photo-preview-img" src="" alt="" hidden>
          </div>
          <div class="photo-upload__actions">
            <button class="btn btn--outline btn--sm" id="photo-btn">Fotoğraf Seç</button>
            <button class="btn btn--ghost btn--sm" id="photo-remove-btn" hidden>Kaldır</button>
          </div>
          <input type="file" id="photo-input" accept="image/*" hidden>
        </div>
        <div class="form-group">
          <label class="form-label">Ad</label>
          <input type="text" id="person-first-name" class="form-input" placeholder="Ad" autocapitalize="words">
        </div>
        <div class="form-group">
          <label class="form-label">Soyad</label>
          <input type="text" id="person-last-name" class="form-input" placeholder="Soyad" autocapitalize="words">
        </div>
        <div class="form-group">
          <label class="form-label">Açıklama / Unvan</label>
          <textarea id="person-desc" class="form-input form-textarea" placeholder="Ör: İl Başkanı, Milletvekili Adayı..."></textarea>
        </div>
        <p class="form-label" style="margin-bottom:8px">Sosyal Medya <span style="opacity:.5;font-weight:400">(opsiyonel)</span></p>
        <div class="social-inputs">
          <div class="social-input-row">
            <span class="social-input-icon" data-platform="instagram"></span>
            <input type="url" id="person-instagram" class="form-input form-input--sm" placeholder="Instagram URL">
          </div>
          <div class="social-input-row">
            <span class="social-input-icon" data-platform="twitter"></span>
            <input type="url" id="person-twitter" class="form-input form-input--sm" placeholder="X (Twitter) URL">
          </div>
          <div class="social-input-row">
            <span class="social-input-icon" data-platform="linkedin"></span>
            <input type="url" id="person-linkedin" class="form-input form-input--sm" placeholder="LinkedIn URL">
          </div>
          <div class="social-input-row">
            <span class="social-input-icon" data-platform="facebook"></span>
            <input type="url" id="person-facebook" class="form-input form-input--sm" placeholder="Facebook URL">
          </div>
          <div class="social-input-row">
            <span class="social-input-icon" data-platform="youtube"></span>
            <input type="url" id="person-youtube" class="form-input form-input--sm" placeholder="YouTube URL">
          </div>
        </div>
      </div>
      <div class="modal-person-footer">
        <button id="save-person-btn" class="btn btn--primary btn--full">Kaydet</button>
        <button id="cancel-person-btn" class="btn btn--ghost btn--full">İptal</button>
      </div>
    </div>
  </div>

  <!-- ── Modal: Manage Users (admin) ───────────── -->
  <div id="modal-users" class="modal-overlay" aria-hidden="true" role="dialog" aria-label="Kullanıcı Yönetimi">
    <div class="modal-sheet" id="modal-users-sheet">
      <div class="modal-sheet__handle"></div>
      <div class="modal-sheet__header-row">
        <h3 class="modal-sheet__title">Kullanıcılar</h3>
        <button id="add-user-btn" class="icon-btn" aria-label="Kullanıcı ekle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
      <div id="users-list" class="users-list"></div>
      <div id="add-user-form" class="add-user-form hidden">
        <div class="form-group">
          <label class="form-label">Ad</label>
          <input type="text" id="new-user-first" class="form-input" placeholder="Ad" autocapitalize="words">
        </div>
        <div class="form-group">
          <label class="form-label">Soyad</label>
          <input type="text" id="new-user-last" class="form-input" placeholder="Soyad" autocapitalize="words">
        </div>
        <div class="form-group">
          <label class="form-label">Özel Kod</label>
          <input type="text" id="new-user-code" class="form-input" placeholder="Kod belirleyin">
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button id="save-user-btn" class="btn btn--primary" style="flex:1">Ekle</button>
          <button id="cancel-user-btn" class="btn btn--ghost" style="flex:1">İptal</button>
        </div>
      </div>
      <button id="close-users-btn" class="btn btn--ghost btn--full" style="margin-top:12px">Kapat</button>
    </div>
  </div>

  <!-- ── Screen: Map ───────────────────────────────── -->
  <div id="screen-map" class="screen">
    <header class="app-header app-header--titled">
      <button id="map-back-btn" class="icon-btn" aria-label="Geri">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h2 class="app-header__title">Harita</h2>
      <button id="settings-btn-3" class="icon-btn" aria-label="Ayarlar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>
    <div id="map-container">
      <div id="leaflet-map"></div>
    </div>
  </div>

  <!-- ── Screen: Events ────────────────────────────── -->
  <div id="screen-events" class="screen">
    <header class="app-header app-header--titled">
      <button id="events-back-btn" class="icon-btn" aria-label="Geri">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h2 class="app-header__title">Etkinlikler</h2>
      <button id="settings-btn-4" class="icon-btn" aria-label="Ayarlar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>
    <div id="events-list" class="events-list">
      <div class="events-empty hidden" id="events-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <p>Henüz etkinlik eklenmemiş</p>
      </div>
    </div>
    <!-- Admin only FAB -->
    <button id="add-event-fab" class="events-fab hidden" aria-label="Etkinlik ekle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>

  <!-- ── Modal: Add/Edit Event ─────────────────────── -->
  <div id="modal-event" class="modal-overlay" aria-hidden="true" role="dialog" aria-label="Etkinlik Formu">
    <div class="modal-sheet" id="modal-event-sheet">
      <div class="modal-sheet__handle"></div>
      <h3 class="modal-sheet__title" id="modal-event-title">Etkinlik Ekle</h3>
      <div class="form-group event-form-group">
        <label class="form-label">Başlık</label>
        <input type="text" id="event-title-input" class="form-input" placeholder="Etkinlik adı">
      </div>
      <div class="form-group event-form-group">
        <label class="form-label">İçerik</label>
        <textarea id="event-body-input" class="form-input form-textarea" placeholder="Etkinlik detayları, yer, saat..."></textarea>
      </div>
      <div class="form-group event-form-group">
        <label class="form-label">Tarih (opsiyonel)</label>
        <input type="date" id="event-date-input" class="form-input">
      </div>
      <button id="save-event-btn" class="btn btn--primary btn--full" style="margin-top:8px">Yayınla</button>
      <button id="cancel-event-btn" class="btn btn--ghost btn--full" style="margin-top:6px">İptal</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/crypto.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/people.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/app.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</div><!-- /#app-shell -->
</body>
</html>
